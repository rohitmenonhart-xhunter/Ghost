# Ghost Agent Configuration

agent:
  max_steps: 50
  screenshot_interval: 0.5  # seconds between captures
  action_timeout: 10.0      # max seconds to wait for action effect
  confirm_destructive: true  # ask before delete/close operations
  screenshot_history: 5      # keep last N screenshots in context

screen:
  capture_method: "mss"  # mss (cross-platform), pillow, or native
  max_resolution: [1920, 1080]  # downscale if larger
  compression_quality: 85  # JPEG quality for history frames

input:
  mouse_move_duration: 0.3  # seconds for mouse movement animation
  typing_interval: 0.02     # seconds between keystrokes
  click_delay: 0.1          # seconds after click before next action

model:
  # Local inference settings
  backend: "transformers"  # transformers, mlx, or llamacpp
  model_path: "./checkpoints/ghost-v0.1"  # LoRA merged model
  base_model: "Qwen/Qwen2.5-VL-7B-Instruct"
  quantization: "4bit"  # for local inference on consumer hardware
  max_new_tokens: 256

actions:
  - "CLICK(x, y)"
  - "DOUBLE_CLICK(x, y)"
  - "RIGHT_CLICK(x, y)"
  - "TYPE(text)"
  - "HOTKEY(keys)"
  - "SCROLL(x, y, direction, amount)"
  - "DRAG(x1, y1, x2, y2)"
  - "WAIT(seconds)"
  - "SCREENSHOT()"
  - "DONE(result)"
